[AccessTransformers]
; Subsystem touches node internals (resource/purity overrides, node type),
; pairs and dresses AFGNodeMeshActor (mNodeActor), invalidates the resource
; scanner's cached node clusters (mNodeClustersUpToDate), and re-points
; portable miners (mExtractResourceNode) at respawned new nodes.
Friend=(Class="AFGResourceNode", FriendClass="ANodeShuffleSubsystem")
Friend=(Class="AFGResourceNodeBase", FriendClass="ANodeShuffleSubsystem")
Friend=(Class="AFGNodeMeshActor", FriendClass="ANodeShuffleSubsystem")
Friend=(Class="AFGResourceScanner", FriendClass="ANodeShuffleSubsystem")
Friend=(Class="AFGPortableMiner", FriendClass="ANodeShuffleSubsystem")
; redesign-11: register our spawned nodes into the resource-node MANAGER's mResourceNodes list — the
; registry the Miner Mk1 extractor hologram queries (GetClosestNode over mResourceNodes). Our runtime-
; spawned nodes never auto-join it (the manager builds it from level nodes at world init), so Mk1 snap
; fails even with a vanilla collision byte-match. Friend grant exposes private mResourceNodes.
Friend=(Class="AFGResourceNodeManager", FriendClass="ANodeShuffleSubsystem")
; redesign-19 DIAGNOSTIC: the Mk1 hologram's TrySnapToActor -> 0 on our nodes (detection passes, resource is
; valid), so a PROTECTED acceptance check inside it (CanOccupyResource / IsAllowedOnResource) rejects ours.
; Friend the module so a static helper can call those protected checks and log which one fails.
Friend=(Class="AFGResourceExtractorHologram", FriendClass="FNodeShuffleModule")
; redesign-22 DIAGNOSTIC: read the Miner's default-extractor restrictions (mRestrictToNodeType,
; mAllowedResourceForms, mOnlyAllowCertainResources, mAllowedResources) to pinpoint which acceptance
; sub-check rejects our custom-subclass node. These are protected on AFGBuildableResourceExtractorBase.
Friend=(Class="AFGBuildableResourceExtractorBase", FriendClass="FNodeShuffleModule")
